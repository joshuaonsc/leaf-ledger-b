<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Leaf Ledger · arena crest</title>

  <!-- ============================================================
       Arena crest (monochrome, white-on-dark). Components are kept
       separate and commented so each can be tweaked independently.
       Palette:  tile/leaf-cutout #2b2f34 · shield #f4f6f8 ·
                 swords #eef1f4 · edge/fuller #9aa3ad
       NOTE: the leaf is a cutout; its fill must match the tile fill.
       Alternative leaf + sword components are kept in .claude/icon-kit.html
       ============================================================ -->

  <!-- tile -->
  <rect width="64" height="64" rx="14" fill="#2b2f34"/>

  <!-- crossed swords behind the shield (blade tips show above, hilts below) -->
  <!-- sword A, rotated -45deg (tip to upper-left) -->
  <g transform="rotate(-45 32 30)" fill="#eef1f4" stroke="#9aa3ad" stroke-width="0.5" stroke-linejoin="round">
    <polygon points="32,6 33.8,15 33.4,44 30.6,44 30.2,15"/>            <!-- blade -->
    <line x1="32" y1="10" x2="32" y2="43" stroke="#9aa3ad" stroke-width="0.6"/> <!-- fuller -->
    <rect x="23" y="44" width="18" height="2.8" rx="1.2"/>              <!-- crossguard -->
    <rect x="30.6" y="46.8" width="2.8" height="6.5" rx="0.9"/>         <!-- grip -->
    <circle cx="32" cy="55" r="2.4"/>                                  <!-- pommel -->
  </g>
  <!-- sword B, rotated +45deg (tip to upper-right) -->
  <g transform="rotate(45 32 30)" fill="#eef1f4" stroke="#9aa3ad" stroke-width="0.5" stroke-linejoin="round">
    <polygon points="32,6 33.8,15 33.4,44 30.6,44 30.2,15"/>
    <line x1="32" y1="10" x2="32" y2="43" stroke="#9aa3ad" stroke-width="0.6"/>
    <rect x="23" y="44" width="18" height="2.8" rx="1.2"/>
    <rect x="30.6" y="46.8" width="2.8" height="6.5" rx="0.9"/>
    <circle cx="32" cy="55" r="2.4"/>
  </g>

  <!-- shield -->
  <path d="M21 17 L43 17 L43 29 C43 39 38 44 32 47 C26 44 21 39 21 29 Z" fill="#f4f6f8"/>

  <!-- maple leaf (5 lobes, prominent top, no stem), cut into the shield in the tile color.
       Sized/centered via the transform; edit the path to reshape the leaf. -->
  <path transform="translate(32 29) scale(0.72) translate(-32 -27.5)" fill="#2b2f34"
        d="M32 15 C30.2 18 29.8 23.5 30.7 26.6 C27.6 23.4 24 21 20.5 20.8 C21.8 24.8 24.4 28 27.2 29.6 C24.8 29.4 22.6 30.2 22.2 31.3 C21.8 32.4 23.4 33.7 25.6 34.6 C23.8 36.4 23.2 38.6 24.2 40.2 C26.8 39 29.4 37.4 31 35.2 C31.1 36.8 31.4 37.8 32 38.8 C32.6 37.8 32.9 36.8 33 35.2 C34.6 37.4 37.2 39 39.8 40.2 C40.8 38.6 40.2 36.4 38.4 34.6 C40.6 33.7 42.2 32.4 41.8 31.3 C41.4 30.2 39.2 29.4 36.8 29.6 C39.6 28 42.2 24.8 43.5 20.8 C40 21 36.4 23.4 33.3 26.6 C34.2 23.5 33.8 18 32 15 Z"/>
</svg>
